<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Under Maintenance | SmartHoliday</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--secondary, #0a192f);
        }
        .maintenance-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--secondary, #0a192f) 0%, #112240 100%);
            color: var(--white, #ffffff);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .maintenance-container::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 50vh;
            height: 50vh;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(242, 159, 5, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
        }
        .maintenance-container::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 40vh;
            height: 40vh;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(21, 101, 192, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
        }
        .maintenance-content {
            z-index: 10;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeSlideUp 0.8s ease forwards;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .maintenance-logo {
            height: 90px;
            width: auto;
            margin-bottom: 25px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .maintenance-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .maintenance-title {
            font-size: 2.2rem;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .maintenance-text {
            color: rgba(255,255,255,0.75);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }
        .btn-wa {
            background-color: #25D366;
            color: white;
            padding: 14px 32px;
            font-size: 1.1rem;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-wa:hover {
            background-color: #128C7E;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
    </style>
  <link rel="stylesheet" crossorigin href="/assets/style-CseVEJ7r.css">
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-content">
            <img src="/assets/logo-DTlbl06P.png" alt="Smart Holiday Logo" class="maintenance-logo">
            <div class="maintenance-icon">🛠️</div>
            <h1 class="maintenance-title">Website Sedang Dalam Perbaikan</h1>
            <p class="maintenance-text">Mohon maaf atas ketidaknyamanannya. Kami sedang melakukan peningkatan sistem untuk memberikan pengalaman layanan tour yang lebih baik. Kami akan segera kembali online!</p>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
            <p class="maintenance-text" style="font-size: 0.95rem; margin-bottom: 20px;">Memiliki pertanyaan mendesak atau butuh bantuan segera?</p>
            <a href="https://wa.me/6281252909674" class="btn-wa">
                💬 Hubungi Tim Kami
            </a>
        </div>
    </div>
</body>
</html>
